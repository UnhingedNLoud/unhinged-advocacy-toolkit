<section class="glass-card gradient-border p-8 mb-12">
  <label class="block text-sm font-bold uppercase text-gray-500 mb-2 tracking-widest">Input Raw Data / Symptoms</label>
  <textarea id="rawInput" 
            class="w-full bg-transparent border-none text-white text-lg p-0 focus:ring-0 placeholder-gray-700" 
            rows="5" 
            placeholder="I feel wiped out today... symptoms started at 4pm..."></textarea>
  
  <div class="mt-8 flex flex-wrap gap-4 border-t border-white/10 pt-6">
    <button onclick="analyzeData()" class="btn-ombre">Generate Receipts</button>
    <button onclick="loadDemo()" class="px-6 py-3 text-white/50 hover:text-white font-bold uppercase text-xs">Load Demo</button>
  </div>
</section>
