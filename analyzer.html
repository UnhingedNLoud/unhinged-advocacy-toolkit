<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE LAB | Biometric Analyzer™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }
    .btn-main {
      background: linear-gradient(90deg, #ff2d95, #a855f7, #00e5ff);
      color: #000;
      font-weight: 900;
      text-transform: uppercase;
      padding: 14px 20px;
      border-radius: 10px;
      width: 100%;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      border-radius: 10px;
      padding: 16px;
      outline: none;
      resize: vertical;
    }
    .card {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
    }
    .small-link {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 800;
      color: #9ca3af;
    }
    .small-link:hover {
      color: white;
    }
  </style>
</head>
<body class="p-6 md:p-10">

  <nav class="mb-8">
    <a href="index.html" class="small-link">← Back to Hub</a>
  </nav>

  <header class="mb-10 max-w-4xl">
    <h1 class="text-5xl md:text-7xl font-black italic uppercase leading-tight">
      Biometric Analyzer™
    </h1>
    <p class="mt-3 text-gray-400 font-bold uppercase tracking-wider text-sm">
      Turn raw symptom language into organized clinical receipts.
    </p>
  </header>

  <main class="max-w-4xl mx-auto">
    <section class="card">
      <h2 class="text-xl font-black uppercase mb-4">Dump the Data</h2>

      <textarea
        id="rawInput"
        placeholder="Paste your symptom notes, flare notes, fatigue, dizziness, pain, medication notes, observations..."
      ></textarea>

      <div class="mt-6 flex flex-col md:flex-row gap-4">
        <button onclick="buildReport()" class="btn-main md:w-auto">Build My Report</button>
        <button onclick="loadDemo()" class="small-link">Load Demo</button>
        <button onclick="clearAll()" class="small-link">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    function buildReport() {
      const input = document.getElementById('rawInput').value.trim();
      if (!input) return;

      if (document.activeElement) {
        document.activeElement.blur();
      }

      const url = 'analyzer-report.html?input=' + encodeURIComponent(input) + '&t=' + Date.now();

      window.open(url, '_blank');
    }

    function loadDemo() {
      document.getElementById('rawInput').value =
        "I've been feeling totally wiped out for three days. My brain fog is so bad I can't drive. My joints hurt and I'm feeling shaky even after I took my meds.";
    }

    function clearAll() {
      document.getElementById('rawInput').value = "";
    }
  </script>
</body>
</html>
