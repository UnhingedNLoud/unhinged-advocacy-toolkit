<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lab - Unhinged N Loud</title>
    <style>
        body {
            background-color: #000 !important;
            color: #fff;
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header-box {
            border: 2px solid #39ff14;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);

        }
        h1 {

            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: #fff;
        }
        .brand {
            font-size: 0.8rem;
            color: #39ff14;
            margin-top: 10px;
            font-weight: bold;
        }
        .toolkit-container {
            width: 100%;
            max-width: 500px;
        }
        .tool-link {
            display: block;
            text-decoration: none;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            border-left: 5px solid #39ff14;
            background: #111;
        }
        .tool-name { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 5px; 
            color: #39ff14;
            text-transform: uppercase;
        }
        .tool-desc { font-size: 0.85rem; color: #888; }
        
        .back-button {
            display: inline-block;
            margin-top: 40px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.8rem;

    <div class="header-box">

        <div class="brand">UNHINGED N LOUD™</div>

    <div class="toolkit-container">
        <a href="analyzer.html" class="tool-link">
            <span class="tool-name">🧪 BIOMETRIC DATA ANALYZER</span>
            <span class="tool-desc">Turn your raw health notes into organized receipts.</span>
        </a>

        <a href="visualizer.html" class="tool-link">
            <span class="tool-name">📈 LAB TREND VISUALIZER</span>
            <span class="tool-desc">Track your labs over time and see the patterns.</span>
