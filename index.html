<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNL™ Health Analyzer | Unhinged N Loud™</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  color: #00eaff;
  font-size: 40px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  background: #111;
  color: white;
  border: 1px solid #333;
  border-radius: 8px;
}

button {
  padding: 14px;
  width: 100%;
  margin-top: 10px;
  background: linear-gradient(90deg,#ff00cc,#00eaff);
  border: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.section {
  margin-top: 30px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>UNL™ Health Analyzer</h1>
<p>Your symptoms aren’t random. Let’s connect the dots.</p>

<!-- STEP 1 -->
<div class="section">
<h2>Step 1: Lab Info</h2>

<input id="labName" placeholder="Lab Name (CRP, TSH)">
<input id="labResult" placeholder="Your Result">
<input id="low" placeholder="Reference Low">
<input id="high" placeholder="Reference High">

</div>

<!-- STEP 2 -->
<div class="section">
<h2>Step 2: Symptoms</h2>

<textarea id="symptoms" placeholder="Fatigue, brain fog, joint pain..."></textarea>

</div>

<!-- BUTTON -->
<button onclick="analyze()">Analyze My Health</button>

<!-- RESULTS -->
<div id="results" class="section hidden">
<h2>Results</h2>
<p id="status"></p>
<p id="explanation"></p>

<button onclick="downloadPDF()">Download Doctor Report</button>
</div>

<script>

let reportText = "";

function analyze() {

let lab = document.getElementById("labName").value;
let result = parseFloat(document.getElementById("labResult").value);
let low = parseFloat(document.getElementById("low").value);
let high = parseFloat(document.getElementById("high").value);
let symptoms = document.getElementById("symptoms").value;

let status = "";
if (result < low) status = "LOW";
else if (result > high) status = "HIGH";
else status = "IN RANGE";

let explanation = "Your " + lab + " is " + status + ".\n\n";

explanation += "Symptoms reported: " + symptoms + "\n\n";

explanation += "This pattern may indicate underlying imbalance and should be discussed with your provider.";

document.getElementById("status").innerText = explanation;
document.getElementById("results").classList.remove("hidden");

reportText = explanation;

}

function downloadPDF() {

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text(reportText, 10, 10);
doc.save("UNL_Report.pdf");

}

</script>

</body>
</html>
