<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unhinged Advocacy Toolkit</title>
    <style>
        /* The "Nuke" CSS - Overrides everything */
        * { background-color: #000 !important; color: #fff !important; border-color: #333; }
        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .header-box { 
            border: 2px solid #39ff14 !important; 
            border-radius: 15px; 
            padding: 25px; 
            text-align: center; 
            margin-top: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 15px #39ff1466;
        }
        h1 { text-shadow: 0 0 10px #39ff14; text-transform: uppercase; margin: 0; font-size: 1.4rem; }
        .brand { color: #39ff14 !important; font-size: 0.8rem; margin-top: 10px; font-weight: bold; }
        
        .toolkit { width: 90%; max-width: 450px; margin-top: 30px; }
        .tool { 
            display: block; 
            text-decoration: none; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            border: 1px solid #333 !important;
        }
        /* Neon Borders */
        .purple { border-left: 6px solid #bc13fe !important; }
        .pink { border-left: 6px solid #ff00e6 !important; }
        .blue { border-left: 6px solid #00d4ff !important; }
        .green { border-left: 6px solid #39ff14 !important; }
        
        .name { font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .desc { font-size: 0.8rem; color: #888 !important; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>ADVOCACY TOOLKIT</h1>
        <div class="brand">UNHINGED N LOUD™</div>
    </div>

    <div class="toolkit">
        <a href="decoder.html" class="tool purple"><span class="name">THE DECODER</span><span class="desc">Translate symptoms to clinical data.</span></a>
        <a href="shield.html" class="tool pink"><span class="name">THE SHIELD</span><span class="desc">Legal rights and recording laws.</span></a>
        <a href="scripts.html" class="tool blue"><span class="name">THE AMMO</span><span class="desc">Words to shut down gaslighting.</span></a>
        <a href="lab.html" class="tool green"><span class="name">THE LAB</span><span class="desc">AI biometric analyzer and trends.</span></a>
    </div>

</body>
</html>
