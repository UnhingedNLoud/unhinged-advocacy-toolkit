<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Decoder - Data Translation</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .header-box { border: 2px solid #bc13fe; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); margin-bottom: 30px; }
        h1 { text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .brand { font-size: 0.8rem; color: #bc13fe; margin-top: 10px; font-weight: bold; }
        .content { max-width: 600px; margin: 0 auto; }
        .translation-card { background: #111; border: 1px solid #bc13fe; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .feeling { color: #bc13fe; font-style: italic; font-size: 0.9rem; }
        .clinical { font-weight: bold; font-size: 1.1rem; margin-top: 5px; display: block; }
        .back-button { display: inline-block; margin-top: 40px; color: #fff; text-decoration: none; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header-box">
        <h1>THE DECODER</h1>
        <div class="brand">UNHINGED N LOUD™</div>
    </div>
    <div class="content">
        <div class="translation-card">
            <span class="feeling">"I'm so tired I can't think."</span>
            <span class="clinical">Cognitive Dysfunction & Chronic Fatigue</span>
        </div>
        <div class="translation-card">
            <span class="feeling">"My skin feels like it's on fire for no reason."</span>
            <span class="clinical">Neuropathic Paresthesia</span>
        </div>
        <div class="translation-card">
            <span class="feeling">"I feel like my heart is racing while I'm sitting."</span>
            <span class="clinical">Postural Tachycardia / Autonomic Dysfunction</span>
        </div>
        <a href="index.html" class="back-button">← BACK TO TOOLKIT</a>
    </div>
</body>
</html>
