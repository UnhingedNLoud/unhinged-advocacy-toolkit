<section id="trend-visualizer-tool" style="
  max-width: 950px;
  margin: 40px auto;
  padding: 28px;
  border-radius: 24px;
  background: #000000;
  border: 1px solid rgba(255,255,255,0.08);
  color: #ffffff;
  box-shadow: 0 0 40px rgba(255,0,150,0.08);
">

  <h2 style="
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(90deg,#ff3ea5,#9f63ff,#28d7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  ">
    Lab Trend Tracker
  </h2>

  <p style="opacity:0.85; margin-bottom:20px;">
    Track one lab at a time. Enter your results and see your pattern clearly.
  </p>

  <!-- INSTRUCTIONS -->
  <div style="
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 20px;
    line-height: 1.7;
  ">
    <strong style="color:#9f63ff;">How to use:</strong><br>
    1. Enter your lab name (TSH, CRP, etc)<br>
    2. Enter results separated by commas<br>
    3. Oldest → Newest<br>
    4. Add range if you have it<br>
    5. Click track
  </div>

  <!-- INPUTS -->
  <div style="display:flex; flex-direction:column; gap:16px;">

    <input id="labTestName" placeholder="Lab Name (Example: TSH)"
      style="padding:16px;border-radius:12px;border:none;background:#111;color:#fff;outline:none;box-shadow:0 0 10px rgba(255,0,150,0.2);">

    <input id="labResults" placeholder="Results (Example: 2.1, 2.5, 3.0)"
      style="padding:16px;border-radius:12px;border:none;background:#111;color:#fff;outline:none;box-shadow:0 0 10px rgba(40,215,255,0.2);">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <input id="refLow" placeholder="Low (1.8)"
        style="padding:16px;border-radius:12px;border:none;background:#111;color:#fff;">
      <input id="refHigh" placeholder="High (4.0)"
        style="padding:16px;border-radius:12px;border:none;background:#111;color:#fff;">
    </div>

    <!-- BUTTONS -->
    <div style="display:flex;gap:10px;">
      <button id="trackTrendBtn"
        style="flex:1;padding:16px;border:none;border-radius:12px;font-weight:800;
        background:linear-gradient(90deg,#ff3ea5,#9f63ff,#28d7ff);color:#000;">
        TRACK
      </button>

      <button id="clearTrendBtn"
        style="flex:1;padding:16px;border:none;border-radius:12px;
        background:#111;color:#fff;border:1px solid rgba(255,255,255,0.2);">
        CLEAR
      </button>
    </div>

    <!-- RESULT -->
    <div id="trendSummary"
      style="padding:18px;border-radius:14px;background:#0a0a0a;border:1px solid rgba(255,255,255,0.08);min-height:140px;">
      Your results will show here.
    </div>

    <!-- CHART -->
    <canvas id="trendChart" style="width:100%;height:300px;"></canvas>

  </div>
</section>

<script>
(function () {
  const name = document.getElementById("labTestName");
  const results = document.getElementById("labResults");
  const low = document.getElementById("refLow");
  const high = document.getElementById("refHigh");
  const btn = document.getElementById("trackTrendBtn");
  const clear = document.getElementById("clearTrendBtn");
  const summary = document.getElementById("trendSummary");
  const canvas = document.getElementById("trendChart");
  const ctx = canvas.getContext("2d");

  function parse(v){
    return v.split(",").map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  }

  function trend(a,b){
    if(b>a) return "📈 Increasing";
    if(b<a) return "📉 Decreasing";
    return "➡️ Stable";
  }

  function draw(vals){
    const w = canvas.clientWidth;
    const h = 300;
    canvas.width = w;
    canvas.height = h;

    ctx.clearRect(0,0,w,h);

    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const range = max-min || 1;

    vals.forEach((v,i)=>{
      const x = i*(w/(vals.length-1));
      const y = h - ((v-min)/range)*h;

      ctx.fillStyle="#28d7ff";
      ctx.beginPath();
      ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fill();

      if(i>0){
        const px=(i-1)*(w/(vals.length-1));
        const py=h - ((vals[i-1]-min)/range)*h;

        ctx.strokeStyle="#ff3ea5";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(x,y);
        ctx.stroke();
      }
    });
  }

  btn.onclick = function(){
    const vals = parse(results.value);
    if(vals.length<2){
      summary.innerHTML="Enter at least 2 values.";
      return;
    }

    const t = trend(vals[0], vals[vals.length-1]);

    summary.innerHTML = `
      <strong>${name.value || "Your Lab"}</strong><br>
      Trend: ${t}<br>
      Latest: ${vals[vals.length-1]}
    `;

    draw(vals);
  }

  clear.onclick = function(){
    name.value="";
    results.value="";
    low.value="";
    high.value="";
    summary.innerHTML="Your results will show here.";
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
})();
</script>
