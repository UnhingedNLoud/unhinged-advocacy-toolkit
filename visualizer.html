<section id="lab-trend-visualizer" style="max-width:900px;margin:40px auto;padding:24px;border-radius:20px;background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);color:white;">
  <h2 style="margin-top:0;font-size:28px;">Lab Trend Visualizer</h2>
  <p style="opacity:0.9;">Enter lab values to see the trend and a simple live projection.</p>

  <div style="display:flex;flex-direction:column;gap:14px;">
    <label for="trendValues" style="font-weight:600;">Lab Values</label>
    <input
      id="trendValues"
      type="text"
      placeholder="Example: 2.1, 2.5, 3.0, 3.4"
      style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(0,0,0,0.25);color:white;font-size:16px;outline:none;box-sizing:border-box;"
    >

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label for="trendRefLow" style="display:block;margin-bottom:6px;font-weight:600;">Reference Low (optional)</label>
        <input
          id="trendRefLow"
          type="number"
          step="any"
          placeholder="Example: 1.8"
          style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(0,0,0,0.25);color:white;font-size:16px;outline:none;box-sizing:border-box;"
        >
      </div>

      <div>
        <label for="trendRefHigh" style="display:block;margin-bottom:6px;font-weight:600;">Reference High (optional)</label>
        <input
          id="trendRefHigh"
          type="number"
          step="any"
          placeholder="Example: 4.0"
          style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(0,0,0,0.25);color:white;font-size:16px;outline:none;box-sizing:border-box;"
        >
      </div>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button
        id="renderTrendBtn"
        type="button"
        style="padding:14px 22px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(90deg,#ff4fd8,#9bff6b);color:#111;"
      >
        Visualize Trend
      </button>

      <button
        id="clearTrendVisualizerBtn"
        type="button"
        style="padding:14px 22px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.12);color:white;"
      >
        Clear
      </button>
    </div>

    <div
      id="projectionSummary"
      style="min-height:120px;padding:18px;border-radius:14px;background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.1);line-height:1.6;"
    >
      Your live trend projection will appear here.
    </div>

    <div
      style="position:relative;width:100%;height:320px;min-height:320px;max-height:320px;padding:12px;border-radius:14px;background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.1);overflow:hidden;box-sizing:border-box;"
    >
      <canvas id="trendCanvas" height="280"></canvas>
    </div>
  </div>
</section>

<script>
(function () {
  const valuesInput = document.getElementById("trendValues");
  const refLowInput = document.getElementById("trendRefLow");
  const refHighInput = document.getElementById("trendRefHigh");
  const renderBtn = document.getElementById("renderTrendBtn");
  const clearBtn = document.getElementById("clearTrendVisualizerBtn");
  const summaryBox = document.getElementById("projectionSummary");
  const canvas = document.getElementById("trendCanvas");

  if (!valuesInput || !refLowInput || !refHighInput || !renderBtn || !clearBtn || !summaryBox || !canvas) return;

  const ctx = canvas.getContext("2d");

  function parseValues(raw) {
    return raw
      .split(",")
      .map(v => parseFloat(v.trim()))
      .filter(v => !Number.isNaN(v));
  }

  function clampProjection(value) {
    if (!Number.isFinite(value)) return 0;
    return Number(value.toFixed(2));
  }

  function getTrendDirection(first, last) {
    if (last > first) return "📈 Increasing";
    if (last < first) return "📉 Decreasing";
    return "➡️ Stable";
  }

  function getReferenceStatus(value, low, high) {
    if (Number.isNaN(low) || Number.isNaN(high)) return "No reference range entered";
    if (value < low) return "Below range";
    if (value > high) return "Above range";
    return "Within range";
  }

  function getProjectedNext(values) {
    if (values.length < 2) return values[0] || 0;

    let totalChange = 0;
    for (let i = 1; i < values.length; i++) {
      totalChange += values[i] - values[i - 1];
    }

    const avgChange = totalChange / (values.length - 1);
    return clampProjection(values[values.length - 1] + avgChange);
  }

  function clearCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width * dpr;
    canvas.height = 280 * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, 280);
  }

  function drawChart(values, projected, refLow, refHigh) {
    clearCanvas();

    const width = canvas.getBoundingClientRect().width;
    const height = 280;
    const padding = 30;

    const allValues = [...values, projected];
    if (!Number.isNaN(refLow)) allValues.push(refLow);
    if (!Number.isNaN(refHigh)) allValues.push(refHigh);

    const minVal = Math.min(...allValues);
    const maxVal = Math.max(...allValues);
    const range = maxVal - minVal || 1;

    function xPos(index, total) {
      if (total <= 1) return padding;
      return padding + (index * (width - padding * 2)) / (total - 1);
    }

    function yPos(value) {
      return padding + ((maxVal - value) / range) * (height - padding * 2);
    }

    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(255,255,255,0.14)";
    for (let i = 0; i < 5; i++) {
      const y = padding + (i * (height - padding * 2)) / 4;
      ctx.beginPath();
      ctx.moveTo(padding, y);
      ctx.lineTo(width - padding, y);
      ctx.stroke();
    }

    if (!Number.isNaN(refLow)) {
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(padding, yPos(refLow));
      ctx.lineTo(width - padding, yPos(refLow));
      ctx.stroke();
      ctx.setLineDash([]);
    }

    if (!Number.isNaN(refHigh)) {
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(padding, yPos(refHigh));
      ctx.lineTo(width - padding, yPos(refHigh));
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.lineWidth = 3;
    ctx.strokeStyle = "#ff4fd8";
    ctx.beginPath();
    values.forEach((value, index) => {
      const x = xPos(index, values.length + 1);
      const y = yPos(value);
      if (index === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    values.forEach((value, index) => {
      const x = xPos(index, values.length + 1);
      const y = yPos(value);
      ctx.fillStyle = "#ff4fd8";
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    });

    const projectedIndex = values.length;
    const projectedX = xPos(projectedIndex, values.length + 1);
    const projectedY = yPos(projected);

    const lastX = xPos(values.length - 1, values.length + 1);
    const lastY = yPos(values[values.length - 1]);

    ctx.lineWidth = 2;
    ctx.strokeStyle = "#9bff6b";
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(projectedX, projectedY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#9bff6b";
    ctx.beginPath();
    ctx.arc(projectedX, projectedY, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";

    values.forEach((_, index) => {
      const x = xPos(index, values.length + 1);
      ctx.fillText("L" + (index + 1), x, height - 8);
    });

    ctx.fillText("Next", projectedX, height - 8);
  }

  function renderTrendProjection() {
    const raw = valuesInput.value.trim();
    const refLow = parseFloat(refLowInput.value);
    const refHigh = parseFloat(refHighInput.value);

    if (!raw) {
      summaryBox.innerHTML = "⚠️ Please enter lab values separated by commas.";
      clearCanvas();
      return;
    }

    const values = parseValues(raw);

    if (values.length < 2) {
      summaryBox.innerHTML = "⚠️ Please enter at least 2 valid values for the live projection.";
      clearCanvas();
      return;
    }

    const first = values[0];
    const last = values[values.length - 1];
    const projected = getProjectedNext(values);
    const trend = getTrendDirection(first, last);
    const currentStatus = getReferenceStatus(last, refLow, refHigh);
    const projectedStatus = getReferenceStatus(projected, refLow, refHigh);

    summaryBox.innerHTML = `
      <div style="font-size:20px;font-weight:700;margin-bottom:10px;">${trend}</div>
      <div><strong>Current Latest Value:</strong> ${last}</div>
      <div><strong>Projected Next Value:</strong> ${projected}</div>
      <div><strong>Current Range Status:</strong> ${currentStatus}</div>
      <div><strong>Projected Range Status:</strong> ${projectedStatus}</div>
      <div><strong>Interpretation:</strong> This is a simple directional projection based on the average change between entered values. It is for tracking patterns only, not diagnosis.</div>
    `;

    drawChart(values, projected, refLow, refHigh);
  }

  function clearVisualizer() {
    valuesInput.value = "";
    refLowInput.value = "";
    refHighInput.value = "";
    summaryBox.innerHTML = "Your live trend projection will appear here.";
    clearCanvas();
  }

  renderBtn.addEventListener("click", function (event) {
    event.preventDefault();
    renderTrendProjection();
  });

  clearBtn.addEventListener("click", function (event) {
    event.preventDefault();
    clearVisualizer();
  });

  clearCanvas();
})();
</script>
