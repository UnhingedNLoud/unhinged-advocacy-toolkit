<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Visualizer - Unhinged N Loud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { border: 2px solid #39ff14; border-radius: 15px; padding: 20px; text-align: center; width: 100%; max-width: 450px; margin-bottom: 25px; }
        h1 { color: #fff; text-shadow: 0 0 10px #39ff14; margin: 0; text-transform: uppercase; font-size: 1.4rem; }
        .brand { color: #39ff14; font-weight: bold; font-size: 0.8rem; }
        .form-container { width: 100%; max-width: 500px; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; box-sizing: border-box; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; font-size: 1rem; }
        .btn { background: #39ff14; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .chart-box { width: 100%; max-width: 500px; background: #000; padding: 15px; border-radius: 10px; margin-top: 25px; border: 1px solid #39ff1444; box-sizing: border-box; }
        .back-button { display: inline-block; margin-top: 30px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>LAB VISUALIZER</h1>
        <div class="brand">UNHINGED N LOUD™</div>
    </div>

    <div class="form-container">
        <input type="text" id="labName" placeholder="Lab Name (e.g. CRP, TSH)" style="width:100%; margin-bottom:15px; box-sizing:border-box;">
        <div class="form-row">
            <input type="date" id="labDate">
            <input type="number" id="labValue" placeholder="Result">
        </div>
        <button class="btn" onclick="addData()">ADD DATA POINT</button>
    </div>

    <div class="chart-box">
        <canvas id="trendChart"></canvas>
    </div>

    <a href="lab.html" class="back-button">← BACK TO THE LAB</a>

    <script>
        let labels = [];
        let dataValues = [];
        const ctx = document.getElementById('trendChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Result Trend',
                    data: dataValues,
                    borderColor: '#39ff14',
                    backgroundColor: 'rgba(57, 255, 20, 0.1)',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#222' }, ticks: { color: '#aaa' } },
                    x: { grid: { color: '#222' }, ticks: { color: '#aaa' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        function addData() {
            const date = document.getElementById('labDate').value;
            const val = document.getElementById('labValue').value;
            if(!date || !val) return alert("Enter date and result.");
            
            labels.push(date);
            dataValues.push(val);
            chart.update();
            
            document.getElementById('labDate').value = "";
            document.getElementById('labValue').value = "";
        }
    </script>
</body>
</html>
