<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Visualizer - Unhinged N Loud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .header { border: 2px solid #39ff14; border-radius: 15px; padding: 20px; text-align: center; }
        .brand { color: #39ff14; font-weight: bold; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; }
        .chart-container { background: #111; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>TREND VISUALIZER</h1>
        <div class="brand">UNHINGED N LOUD™</div>
    </div>

    <div style="margin-top:20px;">
        <div class="form-row">
            <input type="date" id="labDate">
            <input type="number" id="labValue" placeholder="Result">
        </div>
        <input type="text" id="labName" placeholder="Lab Name (e.g., CRP)" style="width:100%; margin-bottom:10px;">
        <button onclick="addData()" style="background:#39ff14; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold;">ADD TO TREND</button>
    </div>

    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>

    <script>
        let labels = [];
        let dataValues = [];
        const ctx = document.getElementById('trendChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Lab Value',
                    data: dataValues,
                    borderColor: '#39ff14',
                    tension: 0.1,
                    fill: false
                }]
            },
            options: {
                scales: {
                    y: { grid: { color: '#222' }, ticks: { color: '#fff' } },
                    x: { grid: { color: '#222' }, ticks: { color: '#fff' } }
                }
            }
        });

        function addData() {
            const date = document.getElementById('labDate').value;
            const val = document.getElementById('labValue').value;
            if(!date || !val) return;
            
            labels.push(date);
            dataValues.push(val);
            chart.update();
        }
    </script>
</body>
</html>
