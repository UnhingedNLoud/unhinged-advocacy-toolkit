<section style="max-width:950px;margin:40px auto;padding:28px;border-radius:24px;background:#000;color:#fff;">

<h2 style="font-size:32px;font-weight:800;background:linear-gradient(90deg,#ff3ea5,#9f63ff,#28d7ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
Lab Trend Tracker
</h2>

<p style="opacity:0.8;margin-bottom:20px;">
Track one lab at a time and see your pattern clearly.
</p>

<div style="background:#111;padding:16px;border-radius:14px;margin-bottom:20px;">
<strong>How to use:</strong><br>
1. Enter lab name<br>
2. Enter results (oldest → newest)<br>
3. Add range if you have it<br>
4. Click track
</div>

<input id="labName" placeholder="Lab Name (TSH, CRP, etc)"
style="width:100%;padding:14px;margin-bottom:12px;border-radius:10px;background:#111;color:#fff;border:none;">

<input id="labValues" placeholder="Results (2.1, 2.5, 3.0)"
style="width:100%;padding:14px;margin-bottom:12px;border-radius:10px;background:#111;color:#fff;border:none;">

<div style="display:flex;gap:10px;margin-bottom:12px;">
<input id="low" placeholder="Low"
style="flex:1;padding:14px;border-radius:10px;background:#111;color:#fff;border:none;">
<input id="high" placeholder="High"
style="flex:1;padding:14px;border-radius:10px;background:#111;color:#fff;border:none;">
</div>

<button id="trackBtn" style="width:100%;padding:16px;border:none;border-radius:12px;font-weight:800;background:linear-gradient(90deg,#ff3ea5,#9f63ff,#28d7ff);color:#000;margin-bottom:12px;">
TRACK LAB TREND
</button>

<button id="downloadBtn" style="width:100%;padding:16px;border:none;border-radius:12px;background:#111;color:#fff;border:1px solid rgba(255,255,255,0.2);">
DOWNLOAD PDF RECEIPT
</button>

<div id="resultBox" style="margin-top:20px;padding:16px;background:#111;border-radius:12px;min-height:100px;">
Your results will appear here.
</div>

<canvas id="chart" style="width:100%;height:300px;margin-top:20px;"></canvas>

</section>

<!-- EMAIL POPUP -->
<div id="emailPopup" style="
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="background:#000;padding:24px;border-radius:16px;width:90%;max-width:400px;">
<h3 style="color:#fff;margin-bottom:10px;">Enter your email</h3>

<input id="emailInput" placeholder="you@example.com"
style="width:100%;padding:14px;margin-bottom:12px;border-radius:10px;background:#111;color:#fff;border:none;">

<button id="sendBtn" style="width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(90deg,#ff3ea5,#9f63ff,#28d7ff);color:#000;">
SEND PDF
</button>

<button id="closePopup" style="margin-top:10px;width:100%;padding:10px;background:#111;color:#fff;border:none;">
CLOSE
</button>

<div id="msg" style="margin-top:10px;"></div>

</div>
</div>

<script>
(function(){

const trackBtn = document.getElementById("trackBtn");
const downloadBtn = document.getElementById("downloadBtn");
const popup = document.getElementById("emailPopup");
const sendBtn = document.getElementById("sendBtn");
const closePopup = document.getElementById("closePopup");
const msg = document.getElementById("msg");

const ctx = document.getElementById("chart").getContext("2d");

function parse(v){
return v.split(",").map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
}

trackBtn.onclick = function(){
const name = document.getElementById("labName").value;
const vals = parse(document.getElementById("labValues").value);

if(vals.length < 2){
document.getElementById("resultBox").innerHTML="Enter at least 2 values.";
return;
}

let trend = "Stable";
if(vals[vals.length-1] > vals[0]) trend="Increasing 📈";
if(vals[vals.length-1] < vals[0]) trend="Decreasing 📉";

document.getElementById("resultBox").innerHTML = `
<strong>${name || "Lab"}</strong><br>
Trend: ${trend}<br>
Latest: ${vals[vals.length-1]}
`;

draw(vals);
};

function draw(vals){
const canvas = ctx.canvas;
const w = canvas.clientWidth;
const h = 300;
canvas.width = w;
canvas.height = h;

ctx.clearRect(0,0,w,h);

const min = Math.min(...vals);
const max = Math.max(...vals);
const range = max-min || 1;

vals.forEach((v,i)=>{
const x = i*(w/(vals.length-1));
const y = h - ((v-min)/range)*h;

ctx.fillStyle="#28d7ff";
ctx.beginPath();
ctx.arc(x,y,5,0,Math.PI*2);
ctx.fill();

if(i>0){
const px=(i-1)*(w/(vals.length-1));
const py=h - ((vals[i-1]-min)/range)*h;

ctx.strokeStyle="#ff3ea5";
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(px,py);
ctx.lineTo(x,y);
ctx.stroke();
}
});
}

// EMAIL FLOW
downloadBtn.onclick = function(){
popup.style.display="flex";
};

closePopup.onclick = function(){
popup.style.display="none";
};

sendBtn.onclick = function(){
const email = document.getElementById("emailInput").value;

if(!email){
msg.innerHTML="Enter email";
msg.style.color="red";
return;
}

msg.innerHTML="Email captured ✅ (connect to email service)";
msg.style.color="lime";

/* OPTIONAL PDF DOWNLOAD */
setTimeout(()=>{
window.location.href="yourfile.pdf";
},1000);

};

})();
</script>
